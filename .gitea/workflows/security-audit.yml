# 1hut security audit stub — DO NOT grow logic here; everything lives in claude/1hut-ci.
# Two parallel jobs, blind to each other: same brief, same diff, zero shared state.
# Advisory: statuses audit/codex + audit/opus are informative, never required.
# This file is public-safe: all infrastructure (clone URL, deploy key, runner image) comes from
# secrets, so the workflow names nothing about the LAN. Private uses: is unsupported (probe
# 2026-07-19) — central logic arrives via read-only deploy-key clone, and the jobs run INSIDE the
# baked je-ci-runner image (bubblewrap + pinned CLIs) via `container:` — no runner reconfig, and
# the shared runner's other workflows keep using stock ubuntu-latest untouched.
name: security audit
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  audit-codex:
    runs-on: ubuntu-latest
    container:
      image: ${{ secrets.HUT_CI_RUNNER_IMAGE }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Fetch central CI logic (read-only deploy key)
        run: |
          umask 077
          printf %s "${{ secrets.HUT_CI_SSH_B64 }}" | base64 -d > /tmp/hut-ci-key
          GIT_SSH_COMMAND="ssh -i /tmp/hut-ci-key -o StrictHostKeyChecking=accept-new" \
            git clone --depth 1 "${{ secrets.HUT_CI_CLONE_URL }}" /tmp/1hut-ci
      - name: Run codex audit
        env:
          CODEX_AUTH_B64: ${{ secrets.CODEX_AUTH_B64 }}
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GITEA_API: ${{ github.server_url }}/api/v1
        run: /tmp/1hut-ci/actions/security-audit/run-local.sh codex
  audit-opus:
    runs-on: ubuntu-latest
    container:
      image: ${{ secrets.HUT_CI_RUNNER_IMAGE }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Fetch central CI logic (read-only deploy key)
        run: |
          umask 077
          printf %s "${{ secrets.HUT_CI_SSH_B64 }}" | base64 -d > /tmp/hut-ci-key
          GIT_SSH_COMMAND="ssh -i /tmp/hut-ci-key -o StrictHostKeyChecking=accept-new" \
            git clone --depth 1 "${{ secrets.HUT_CI_CLONE_URL }}" /tmp/1hut-ci
      - name: Run opus audit
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GITEA_API: ${{ github.server_url }}/api/v1
        run: /tmp/1hut-ci/actions/security-audit/run-local.sh opus
